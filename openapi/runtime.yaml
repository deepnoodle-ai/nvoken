openapi: 3.1.0
info:
  title: nvoken Runtime API
  version: 0.1.0
  summary: Durable Invocation admission, execution, recovery, and live-output contract
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: |
    This focused contract defines nvoken's implemented background Runtime surface:
    durable Invocation admission, authoritative Invocation and Session reads,
    cursor-based transcript recovery, and resumable Session output streaming.

    The Runtime API has no deletion, compaction, or retention-control operation.
    Authoritative records exposed by this contract are retained by default; the
    complete inventory and any future ordered-deletion contract are governed by
    the design packet's Data and retention section.

    Inline and callback host tools, structured output, and reusable model
    provider credential lifecycle are included. Spec references and general
    administrative APIs remain outside this version.
servers:
  - url: /
    description: Current nvoken installation
security:
  - bearerAuth: []
tags:
  - name: Invocations
    description: Durable agent-turn admission and state.
  - name: Models
    description: Curated model discovery and exact model-selection inspection.
  - name: MCP
    description: Stateless remote MCP server discovery.
  - name: Sessions
    description: Durable conversation identity and state.
  - name: Provider credentials
    description: Encrypted Account and tenant model-provider BYOK lifecycle.
paths:
  /v1/mcp/list-tools:
    post:
      tags: [MCP]
      operationId: listMCPTools
      summary: Discover and project one remote MCP server's tools
      description: |
        Opens one short-lived streamable-HTTP MCP session through guarded
        public-only egress, drains tools/list pagination, applies the same
        allowlist and projection rules used by Invocation execution, and then
        closes the session. Supplied headers are used only for this request,
        are never logged or returned, and are not persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPListToolsRequest"
      responses:
        "200":
          description: Stable projected tools and bounded exclusions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPListToolsResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "502":
          $ref: "#/components/responses/MCPDiscoveryFailed"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations:
    get:
      tags: [Invocations]
      operationId: listInvocations
      summary: List authoritative Invocations
      description: |
        Returns newest-first durable Invocation state. Exact filters combine
        with AND. An Account-wide caller may list all tenant partitions, one
        named partition with `tenant_key`, or the default partition with
        `default_tenant=true`. A tenant-constrained credential is always scoped
        to its partition. The opaque cursor is bound to the normalized filter
        set and credential tenant scope.
      parameters:
        - $ref: "#/components/parameters/TenantKeyFilter"
        - $ref: "#/components/parameters/DefaultTenantFilter"
        - name: session_id
          in: query
          schema:
            $ref: "#/components/schemas/SessionID"
        - name: agent_id
          in: query
          schema:
            $ref: "#/components/schemas/AgentID"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InvocationStatus"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: One bounded page of Invocations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvocationList"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
    post:
      tags: [Invocations]
      operationId: createInvocation
      summary: Durably admit one background agent turn
      description: |
        Resolves or creates the Account-wide Agent identity anchor, resolves or
        creates a Session, snapshots the inline execution spec, appends exactly
        one caller-input message, and creates one queued Invocation in a single
        transaction. The response is sent only after that transaction commits;
        the request handler never executes the model.

        `session_id` and `session_key` are mutually exclusive. A Session ID must
        belong to the authenticated Account and named Agent. An Account-wide
        credential may omit `tenant_key` and use the Session's stored partition.
        A tenant-constrained credential cannot cross its partition; an explicit
        mismatch is rejected with `403 forbidden` before resource lookup.

        `idempotency_key` is scoped to the authenticated Account, effective
        tenant partition, and `agent_key`. A same-key replay is checked before
        the Session's one-nonterminal-Invocation rule. It returns the original
        records without appending input, even when the Invocation is terminal.
        Material equality covers the Session selector kind and value, the inline
        spec, and input. Requested limits are compared before default resolution,
        so an explicit default differs from omission. JSON object member
        order is ignored, array order is significant, and strings are not
        rewritten. A changed material field returns `idempotency_conflict`.

        The encoded JSON request body is limited to 1 MiB. Requests over that
        limit are rejected before admission. With `Accept: text/event-stream`,
        the committed admission is the first `invocation.accepted` frame and
        the connection tails that Invocation through `invocation.result`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvocationRequest"
            examples:
              newSession:
                summary: First use creates the Agent anchor and a new Session
                value:
                  agent_key: support-triage
                  tenant_key: tenant-acme
                  idempotency_key: ticket-483:first-reply
                  input: Why was I charged twice?
                  spec:
                    model:
                      provider: anthropic
                      id: claude-sonnet-5
              keyedSession:
                summary: Resolve or create a tenant-partitioned host Session key
                value:
                  agent_key: support-triage
                  tenant_key: tenant-acme
                  session_key: ticket-483
                  idempotency_key: ticket-483:follow-up-2
                  input:
                    content:
                      - type: text
                        text: Can you show me the two charge dates?
                  spec:
                    instructions: You are a concise billing support agent.
                    model:
                      provider: anthropic
                      id: claude-sonnet-5
              existingSession:
                summary: Continue an existing Session by durable ID
                value:
                  agent_key: support-triage
                  session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                  idempotency_key: ticket-483:follow-up-3
                  input:
                    content:
                      - type: text
                        text: Please summarize what happened.
                  spec:
                    instructions: You are a concise billing support agent.
                    model:
                      provider: openai
                      id: gpt-5.4
              structuredOutput:
                summary: Require one validated machine-readable object
                value:
                  agent_key: support-triage
                  session_key: ticket-483
                  idempotency_key: ticket-483:classification
                  input:
                    content:
                      - type: text
                        text: Classify the billing problem.
                  spec:
                    instructions: Classify the request, then submit the result.
                    model:
                      provider: anthropic
                      id: claude-sonnet-5
                    output:
                      schema:
                        type: object
                        properties:
                          category:
                            type: string
                            enum: [duplicate_charge, refund, other]
                        required: [category]
                        additionalProperties: false
      responses:
        "202":
          description: |
            The Invocation is durably admitted, or an existing Invocation was
            returned for an equal idempotent replay. A replay remains `202` even
            when the returned status is terminal. `Accept: text/event-stream`
            selects an Invocation-scoped stream with `invocation.accepted` as
            its first frame and `invocation.result` as its terminal durable
            frame.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvocationAcknowledgement"
              examples:
                admitted:
                  summary: New durable admission
                  value:
                    agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                    session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                    invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                    status: queued
                    deduplicated: false
                    deadline_at: "2026-07-20T14:31:02Z"
                replayed:
                  summary: Lost acknowledgement followed by equal replay
                  value:
                    agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                    session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                    invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                    status: running
                    deduplicated: true
                    deadline_at: "2026-07-20T14:31:02Z"
                terminalReplay:
                  summary: Equal replay after settlement still returns 202
                  value:
                    agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                    session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                    invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                    status: completed
                    deduplicated: true
                    deadline_at: "2026-07-20T14:31:02Z"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/InvocationStreamEvent"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The idempotency key conflicts or the Session already has nonterminal work.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                idempotencyConflict:
                  summary: Same scope and key, changed material request
                  value:
                    code: idempotency_conflict
                    message: The idempotency key was already used with a different request.
                    request_id: req_01K0NV89D93D0W2V5CGF8BC2R7
                    details:
                      conflicting_fields: [input]
                activeInvocation:
                  summary: Distinct request races existing nonterminal work
                  value:
                    code: session_invocation_active
                    message: This Session already has a nonterminal Invocation.
                    request_id: req_01K0NV8AJQ9FB89N5MZ5HDZDR3
                    details:
                      invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                      status: running
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations/{invocation_id}:
    parameters:
      - $ref: "#/components/parameters/InvocationID"
    get:
      tags: [Invocations]
      operationId: getInvocation
      summary: Read authoritative Invocation identity and state
      description: |
        Returns the durable current state. Post-admission failures appear here.
        A credential authenticated for Runtime but denied this read operation
        receives `forbidden`.
        A resource outside the authenticated Account or tenant constraint is
        reported as `not_found` when disclosure would reveal its existence.
      responses:
        "200":
          description: Authoritative Invocation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invocation"
              examples:
                queuedAfterEngineLoss:
                  value:
                    id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                    agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                    session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                    status: queued
                    error: null
                    usage: null
                    provenance: null
                    structured_output: null
                    structured_output_provenance: null
                    limits:
                      total_timeout_seconds: 1800
                      active_timeout_seconds: 1800
                      waiting_timeout_seconds: 1800
                      max_iterations: 1
                    active_execution_ms: 7000
                    deadline_at: "2026-07-20T14:31:02Z"
                    created_at: "2026-07-20T14:01:02Z"
                    updated_at: "2026-07-20T14:01:09Z"
                    ended_at: "2026-07-20T14:01:09Z"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations/{invocation_id}/result:
    parameters:
      - $ref: "#/components/parameters/InvocationID"
    get:
      tags: [Invocations]
      operationId: getInvocationResult
      summary: Read the composed Invocation result
      description: |
        Returns one InvocationResult at any status: the authoritative
        Invocation, this Invocation's canonical messages composed at read
        time, and the output_text convenience projection. The Invocation and
        its messages are read in one repeatable-read snapshot, so the payload
        never shows a terminal status with a missing message tail.
        Authentication, tenant scoping, and the nondisclosing not_found rule
        match the plain Invocation read exactly.
      responses:
        "200":
          description: Composed Invocation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvocationResult"
              examples:
                completedTextTurn:
                  value:
                    invocation:
                      id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                      agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                      session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                      status: completed
                      error: null
                      usage: null
                      provenance: null
                      structured_output: null
                      structured_output_provenance: null
                      limits:
                        total_timeout_seconds: 1800
                        active_timeout_seconds: 1800
                        waiting_timeout_seconds: 1800
                        max_iterations: 1
                      active_execution_ms: 7000
                      deadline_at: "2026-07-20T14:31:02Z"
                      created_at: "2026-07-20T14:01:02Z"
                      updated_at: "2026-07-20T14:01:09Z"
                      ended_at: "2026-07-20T14:01:09Z"
                    messages:
                      - id: smsg_019b0a12-9e61-7a44-bed2-0e07c1bdb333
                        session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                        agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                        invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                        sequence: 1
                        role: user
                        content:
                          - type: text
                            text: Reply with a short hello.
                        created_at: "2026-07-20T14:01:02Z"
                      - id: smsg_019b0a12-af71-7b54-9ed2-0e07c1bdb344
                        session_id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                        agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                        invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                        sequence: 2
                        role: assistant
                        content:
                          - type: text
                            text: Hello!
                        created_at: "2026-07-20T14:01:09Z"
                    output_text: Hello!
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations/{invocation_id}/stream:
    parameters:
      - $ref: "#/components/parameters/InvocationID"
    get:
      tags: [Invocations]
      operationId: streamInvocation
      summary: Resume and tail one Invocation over SSE
      description: |
        Replays durable updates after `cursor`, forwards ephemeral output
        previews for this Invocation, and ends only when this Invocation
        settles or the connection rotates. Durable frames carry an SSE `id`;
        previews and control frames do not. After `stream.resync`, discard
        provisional output and wait for durable state.

        The explicit `cursor` query parameter takes precedence over
        `Last-Event-ID`. `stream.end` reason `rotate` means reconnect with the
        last durable ID. Disconnecting never cancels the Invocation.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: Last-Event-ID
          in: header
          description: Opaque cursor from the last durable frame; ignored when `cursor` is supplied.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Invocation-scoped event stream.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/InvocationStreamEvent"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations/{invocation_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/InvocationID"
    post:
      tags: [Invocations]
      operationId: cancelInvocation
      summary: Idempotently cancel an Invocation
      description: |
        Atomically makes nonterminal work `cancelled`. Repeating the request,
        or cancelling an Invocation that already completed or failed, returns
        the unchanged authoritative terminal row. A successful response means
        cancellation is durable; provider work stops cooperatively and may
        have already incurred external cost. The request body must be empty.
      responses:
        "200":
          description: Authoritative terminal Invocation state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invocation"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/invocations/{invocation_id}/tool-results:
    parameters:
      - $ref: "#/components/parameters/InvocationID"
    post:
      tags: [Invocations]
      operationId: submitHostToolResults
      summary: Submit durable results for pending host ToolCalls
      description: |
        Atomically accepts one bounded batch for a waiting Invocation. The
        first committed result for each ToolCall wins. An equal replay is
        acknowledged as deduplicated; a changed replay conflicts. Partial
        batches leave the Invocation waiting. Closing the final pending call
        queues the same Invocation and its successor execution dispatch before
        returning `202`.

        This command accepts only host-mode calls owned by the path
        Invocation and authenticated Account/tenant scope. It is not a generic
        Session append endpoint. The body is limited to 1 MiB; each result
        content value is valid JSON limited to 256 KiB and 32 nesting levels.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitHostToolResultsRequest"
            example:
              results:
                - tool_call_id: tcal_019b0a12-9e61-7144-bed2-0e07c1bdb333
                  content:
                    order_id: order-123
                    state: ready
                - tool_call_id: tcal_019b0a12-af71-7254-8ed2-0e07c1bdb344
                  content:
                    delivered: false
                  is_error: true
      responses:
        "202":
          description: The complete batch committed, possibly as equal replays.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitHostToolResultsResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The Invocation cannot accept the supplied result batch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notWaiting:
                  value:
                    code: invocation_not_waiting
                    message: The Invocation is not waiting for this host tool result.
                    request_id: req_01K0NV8AJQ9FB89N5MZ5HDZDR3
                conflict:
                  value:
                    code: tool_result_conflict
                    message: A different result was already accepted for this ToolCall.
                    request_id: req_01K0NV8AJQ9FB89N5MZ5HDZDR3
                expired:
                  value:
                    code: tool_result_expired
                    message: The host tool result deadline has expired.
                    request_id: req_01K0NV8AJQ9FB89N5MZ5HDZDR3
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/provider-credentials:
    get:
      tags: [Provider credentials]
      operationId: listProviderCredentials
      summary: List reusable provider credential metadata
      description: Viewer, Runtime, and Operator profiles may read metadata within their exact scope; secret material is never readable.
      parameters:
        - name: provider
          in: query
          schema:
            $ref: "#/components/schemas/ModelProvider"
        - name: scope
          in: query
          schema:
            $ref: "#/components/schemas/ProviderCredentialScope"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked]
        - name: tenant_key
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - name: cursor
          in: query
          description: Opaque continuation cursor bound to the Account, effective scope, filters, and limit.
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Bounded credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredentialList"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
    post:
      tags: [Provider credentials]
      operationId: createProviderCredential
      summary: Create one reusable provider credential
      description: |
        Creates encrypted Account or tenant BYOK. Account scope requires an
        Operator credential. A tenant-constrained Runtime credential may manage
        only its exact tenant partition. The response contains metadata only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderCredentialRequest"
      responses:
        "201":
          description: Provider credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredential"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: The idempotency key changed nonsecret request metadata or an active credential already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v1/provider-credentials/{provider_credential_id}:
    parameters:
      - $ref: "#/components/parameters/ProviderCredentialID"
    get:
      tags: [Provider credentials]
      operationId: getProviderCredential
      summary: Read provider credential metadata
      description: Viewer, Runtime, and Operator profiles may read secret-free metadata within their exact scope.
      responses:
        "200":
          description: Provider credential metadata without secret material.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredential"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
    delete:
      tags: [Provider credentials]
      operationId: revokeProviderCredential
      summary: Revoke a provider credential and destroy live encrypted versions
      responses:
        "200":
          description: Revoked credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredential"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v1/provider-credentials/{provider_credential_id}/rotate:
    parameters:
      - $ref: "#/components/parameters/ProviderCredentialID"
    post:
      tags: [Provider credentials]
      operationId: rotateProviderCredential
      summary: Rotate a provider credential
      description: Replaces the active version, optionally preserving a bounded overlap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateProviderCredentialRequest"
      responses:
        "200":
          description: Current provider credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCredential"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The rotation idempotency key names another credential or changed expiry or overlap metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v1/models:
    get:
      tags: [Models]
      operationId: listModels
      summary: List nvoken's curated model catalog
      description: |
        Returns the complete bounded set of text-generation models nvoken
        intentionally advertises. Catalog membership means nvoken maintains
        metadata for the exact provider/model selection. It does not prove that
        the caller's provider account, region, or selected credential can access
        the model. Ordering is deterministic but has no semantic meaning.
      parameters:
        - name: provider
          in: query
          description: Limit results to one installed canonical provider.
          schema:
            $ref: "#/components/schemas/ModelProvider"
        - name: include_deprecated
          in: query
          description: Include catalog entries nvoken marks as deprecated.
          schema:
            type: boolean
            default: false
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: The complete matching model catalog.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
              examples:
                catalog:
                  value:
                    items:
                      - provider: anthropic
                        id: claude-opus-4-8
                        cataloged: true
                        display_name: Claude Opus 4.8
                        description: Deep reasoning for complex agent workloads.
                        context_window_tokens: 1000000
                        max_output_tokens: 128000
                        input_modalities: [text]
                        recommended: false
                        deprecated: false
                        pricing:
                          status: priced
                          currency: USD
                          unit: per_million_tokens
                          input: "5"
                          output: "25"
                          cache_read: "0.5"
                          cache_write: "6.25"
                          updated_at: "2026-05-28"
                          pricing_version: b3f91e2a
                    catalog_version: 665048c7
        "304":
          description: The matching representation has not changed.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v1/models/{provider}/{model_id}:
    parameters:
      - name: provider
        in: path
        required: true
        description: Installed canonical model provider.
        schema:
          $ref: "#/components/schemas/ModelProvider"
      - name: model_id
        in: path
        required: true
        allowReserved: false
        description: |
          Exact model ID used in `spec.model.id`. Encode the complete value as
          one path segment, including `/`, reserved characters, and Unicode.
        schema:
          type: string
          minLength: 1
          maxLength: 255
    get:
      tags: [Models]
      operationId: getModel
      summary: Inspect one exact provider/model selection
      description: |
        Returns a descriptor for any valid installed provider and exact model
        ID, including IDs outside the curated catalog. `cataloged` distinguishes
        maintained metadata from tolerant inspection. Pricing is the standard
        local USD estimate used by nvoken's estimated-cost guardrail, not
        provider billing or proof of account access.
      parameters:
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Exact model-selection descriptor.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelDescriptor"
              examples:
                uncataloged:
                  value:
                    provider: openai
                    id: experimental/model
                    cataloged: false
                    pricing:
                      status: unpriced
                      pricing_version: 8fd0a7c2
        "304":
          description: The exact descriptor has not changed.
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/Internal" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /v1/sessions:
    get:
      tags: [Sessions]
      operationId: listSessions
      summary: List authoritative Sessions
      description: |
        Returns newest-first Session identity and current nonterminal
        Invocation state. Exact filters combine with AND. Tenant filtering and
        cursor binding follow the Invocation-list rules.
      parameters:
        - $ref: "#/components/parameters/TenantKeyFilter"
        - $ref: "#/components/parameters/DefaultTenantFilter"
        - name: agent_id
          in: query
          schema:
            $ref: "#/components/schemas/AgentID"
        - name: session_key
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 255
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: One bounded page of Sessions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionID"
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Read authoritative Session identity and current state
      description: |
        An Account-wide credential may resolve a Session in any tenant partition
        in its Account. A tenant-constrained credential resolves only Sessions
        in its partition. Missing, incompatible, and undisclosable resources use
        `not_found`; a credential denied the read operation itself receives
        `forbidden`.
      responses:
        "200":
          description: Authoritative Session identity and state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
              examples:
                keyedTenantSession:
                  value:
                    id: sesn_019b0a12-7c41-7e24-8ed2-0e07c1bdb311
                    agent_id: agnt_019b0a12-6a31-7d14-9ed2-0e07c1bdb300
                    tenant_key: tenant-acme
                    session_key: ticket-483
                    active_invocation_id: invk_019b0a12-8d51-7f34-aed2-0e07c1bdb322
                    active_invocation_status: running
                    created_at: "2026-07-20T14:01:02Z"
                    updated_at: "2026-07-20T14:01:05Z"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/sessions/{session_id}/messages:
    parameters:
      - $ref: "#/components/parameters/SessionID"
    get:
      tags: [Sessions]
      operationId: listSessionMessages
      summary: Page through the canonical Session transcript
      description: |
        Returns persisted SessionMessage rows in ascending sequence order.
        The opaque forward cursor is bound to the authenticated Account and
        Session. This history endpoint contains no lifecycle or live-preview
        copies.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: One bounded page of canonical messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMessageList"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/sessions/{session_id}/transcript:
    parameters:
      - $ref: "#/components/parameters/SessionID"
    get:
      tags: [Sessions]
      operationId: getSessionTranscript
      summary: Drain a fixed-cut incremental transcript snapshot
      description: |
        Projects canonical messages and append-only Invocation lifecycle
        changes. Supply a prior `resume_cursor` as `cursor` to drain newer
        durable state. Continue a multi-page fixed cut with `page_token` until
        `has_more` is false. Each page contains one phase: all message pages are
        delivered before lifecycle-change pages, so terminal state cannot
        precede the transcript rows committed with it. Omitting both positions
        starts at the beginning of the retained Session.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: page_token
          in: query
          description: Opaque fixed-cut continuation from `next_page_token`.
          schema:
            type: string
            minLength: 1
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: One phase of a fixed-cut transcript snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptSnapshot"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
  /v1/sessions/{session_id}/transcript/stream:
    parameters:
      - $ref: "#/components/parameters/SessionID"
    get:
      tags: [Sessions]
      operationId: streamSessionTranscript
      summary: Replay and tail one Session transcript over SSE
      description: |
        Opens a resumable Server-Sent Events projection over the same fixed-cut
        transcript read model as the JSON endpoint. The server subscribes to
        live fan-out before its first Postgres drain, re-drains Postgres on a
        bounded poll, and closes after authoritative terminal reconciliation or
        deliberate rotation. Disconnecting never cancels the Invocation.

        Every nonempty `transcript.update` frame carries
        `id: <resume_cursor>`; that opaque ID is the only replay position
        clients persist. `output_text.delta`, `thinking.delta`,
        `stream.resync`, and `stream.end` never carry an `id`. Deltas are
        ephemeral and may be lost; after `stream.resync`, discard provisional
        output and wait for canonical messages. `stream.end` reason `terminal`
        means the final Postgres drain observed no nonterminal Invocation.
        Reason `rotate` means reconnect with the last durable ID. An abnormal
        close has no terminal meaning.

        The explicit `cursor` query parameter takes precedence over
        `Last-Event-ID`. Bearer authentication requires an SSE-capable HTTP
        client that can set the `Authorization` header; the browser EventSource
        constructor alone cannot do so. The server emits `retry: 1000` as its
        default reconnect delay.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: Last-Event-ID
          in: header
          description: Opaque `resume_cursor` from the last durable update frame; ignored when `cursor` is supplied.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: |
            SSE frames named `transcript.update`, `output_text.delta`,
            `thinking.delta`, `stream.resync`, and `stream.end`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/TranscriptStreamEvent"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/Internal"
        "503":
          $ref: "#/components/responses/Unavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  headers:
    ETag:
      description: Strong validator for this exact JSON representation.
      schema:
        type: string
  parameters:
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: ETag from a prior response for this exact representation.
      schema:
        type: string
        minLength: 1
    InvocationID:
      name: invocation_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/InvocationID"
    SessionID:
      name: session_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/SessionID"
    ProviderCredentialID:
      name: provider_credential_id
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ProviderCredentialID"
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor returned by the same operation and filter set.
      schema:
        type: string
        minLength: 1
    Limit:
      name: limit
      in: query
      description: Maximum items in this page. Defaults to 100.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
    TenantKeyFilter:
      name: tenant_key
      in: query
      description: Exact non-default tenant partition reference.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    DefaultTenantFilter:
      name: default_tenant
      in: query
      description: Select only the default tenant partition. Mutually exclusive with tenant_key.
      schema:
        type: boolean
        default: false
  schemas:
    AgentID:
      type: string
      pattern: "^agnt_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: UUIDv7 with the public `agnt_` prefix.
    SessionID:
      type: string
      pattern: "^sesn_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: UUIDv7 with the public `sesn_` prefix.
    InvocationID:
      type: string
      pattern: "^invk_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: UUIDv7 with the public `invk_` prefix.
    ProviderCredentialID:
      type: string
      pattern: "^pcrd_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: UUIDv7 with the public `pcrd_` prefix.
    ProviderCredentialVersionID:
      type: string
      pattern: "^pcvr_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: UUIDv7 with the public `pcvr_` prefix.
    ModelProvider:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
      description: |
        Extensible canonical provider identifier. Consumers must preserve
        unknown values so adding a provider does not break decoding. Request
        positions still reject providers not registered by the installation.
    ModelPricing:
      type: object
      additionalProperties: false
      required: [status, pricing_version]
      description: |
        Standard local price evidence used by nvoken's estimated-cost
        guardrail. A `priced` object also carries currency, unit, input, output,
        and update date. `unpriced` and `unknown` carry only status and the
        opaque pricing version. Clients compare versions for equality only.
      properties:
        status:
          type: string
          enum: [priced, unpriced, unknown]
        currency:
          type: string
          enum: [USD]
        unit:
          type: string
          enum: [per_million_tokens]
        input:
          type: string
          pattern: '^(0|[1-9][0-9]*)(\.[0-9]+)?$'
        output:
          type: string
          pattern: '^(0|[1-9][0-9]*)(\.[0-9]+)?$'
        cache_read:
          type: string
          pattern: '^(0|[1-9][0-9]*)(\.[0-9]+)?$'
        cache_write:
          type: string
          pattern: '^(0|[1-9][0-9]*)(\.[0-9]+)?$'
        updated_at:
          type: string
          format: date
        pricing_version:
          type: string
          minLength: 1
          description: |
            Opaque nvoken-owned identifier for the local pricing snapshot.
            Values never encode an upstream dependency name or version.
    ModelDescriptor:
      type: object
      additionalProperties: false
      required: [provider, id, cataloged, pricing]
      properties:
        provider:
          $ref: "#/components/schemas/ModelProvider"
        id:
          type: string
          minLength: 1
          maxLength: 255
        cataloged:
          type: boolean
          description: Whether nvoken advertises and maintains metadata for this selection.
        display_name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        context_window_tokens:
          type: integer
          minimum: 1
        max_output_tokens:
          type: integer
          minimum: 1
        input_modalities:
          type: array
          minItems: 1
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*$"
          description: Input types nvoken currently accepts for this model selection.
        recommended:
          type: boolean
          description: nvoken's suggested general-purpose starting point for this provider.
        deprecated:
          type: boolean
        pricing:
          $ref: "#/components/schemas/ModelPricing"
      description: |
        Cataloged descriptors include all maintained metadata fields.
        Uncataloged descriptors include only provider, id, cataloged, and
        pricing; absent metadata is unknown rather than false or zero.
    ModelList:
      type: object
      additionalProperties: false
      required: [items, catalog_version]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModelDescriptor"
        catalog_version:
          type: string
          minLength: 1
          description: Opaque version of the complete unfiltered catalog and pricing snapshot.
    ProviderCredentialScope:
      type: string
      enum: [account, tenant]
    CreateInvocationRequest:
      type: object
      additionalProperties: false
      required: [agent_key, idempotency_key, input, spec]
      not:
        required: [session_id, session_key]
      properties:
        agent_key:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Stable caller-controlled Agent key, unique within the
            authenticated Account. The resulting Agent anchor stores identity
            only and is shared across tenant partitions.
        tenant_key:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Optional tenant partition. For Session-key resolution or a new
            Session, precedence is credential constraint, this explicit value,
            then the Account's default partition. For Session-ID resolution, an
            Account-wide caller may omit it and use the stored partition.
        session_id:
          $ref: "#/components/schemas/SessionID"
          description: Existing Session to continue. Mutually exclusive with session_key.
        session_key:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Caller key resolved within (Account, effective tenant partition,
            Agent, session_key). Mutually exclusive with session_id.
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Stable admission identity scoped to (Account, effective tenant
            partition, agent_key). Reuse an unchanged request after any 5xx,
            timeout, disconnect, or missing acknowledgement. Deduplication is
            guaranteed while the original Invocation is retained.
        input:
          $ref: "#/components/schemas/InvocationInput"
        spec:
          $ref: "#/components/schemas/InlineExecutionSpec"
        provider_credentials:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/InvocationProviderCredentialSelection"
          description: |
            Explicit nonsecret source selection for the spec model provider.
            Omission selects the deployment's configured default. The
            selection is stored outside the execution spec; only
            caller_ephemeral accepts secret material. Equal idempotent replay
            never replaces the original encrypted credential. The field is
            deliberately plural even though this contract currently permits
            one entry: future routed invocations may select credentials for
            more than one model provider.
    InvocationProviderCredentialSelection:
      oneOf:
        - type: object
          additionalProperties: false
          required: [provider, source, credential]
          properties:
            provider:
              $ref: "#/components/schemas/ModelProvider"
            source:
              type: string
              enum: [caller_ephemeral]
              x-enum-varnames: [SourceCallerEphemeral]
            credential:
              $ref: "#/components/schemas/ProviderStaticCredential"
        - type: object
          additionalProperties: false
          required: [provider, source]
          properties:
            provider:
              $ref: "#/components/schemas/ModelProvider"
            source:
              type: string
              enum: [account_byok, tenant_byok, platform]
      description: Exactly one selection matching the canonical spec provider.
    ProviderStaticCredential:
      type: object
      additionalProperties: false
      required: [api_key]
      properties:
        api_key:
          type: string
          minLength: 1
          maxLength: 65536
          writeOnly: true
          description: Encrypted before persistence and never returned.
    CreateProviderCredentialRequest:
      type: object
      additionalProperties: false
      required: [provider, scope, credential, idempotency_key]
      properties:
        provider:
          $ref: "#/components/schemas/ModelProvider"
        scope:
          $ref: "#/components/schemas/ProviderCredentialScope"
        tenant_key:
          type: string
          minLength: 1
          maxLength: 255
          description: Required for tenant scope and forbidden for Account scope.
        credential:
          $ref: "#/components/schemas/ProviderStaticCredential"
        expires_at:
          type: string
          format: date-time
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 255
    RotateProviderCredentialRequest:
      type: object
      additionalProperties: false
      required: [credential, idempotency_key]
      properties:
        credential:
          $ref: "#/components/schemas/ProviderStaticCredential"
        expires_at:
          type: string
          format: date-time
        overlap_seconds:
          type: integer
          minimum: 0
          maximum: 3600
          default: 0
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 255
    ProviderCredential:
      type: object
      additionalProperties: false
      required: [id, provider, scope, tenant_key, status, version, version_id, previous_version_id, version_status, expires_at, overlap_expires_at, created_by, created_at, updated_at, revoked_at]
      properties:
        id:
          $ref: "#/components/schemas/ProviderCredentialID"
        provider:
          $ref: "#/components/schemas/ModelProvider"
        scope:
          $ref: "#/components/schemas/ProviderCredentialScope"
        tenant_key:
          oneOf:
            - type: string
            - type: "null"
        status:
          type: string
          enum: [active, revoked]
          description: Active roots remain rotatable and revocable even when their current version has expired.
        version:
          type: integer
          minimum: 1
        version_id:
          $ref: "#/components/schemas/ProviderCredentialVersionID"
        previous_version_id:
          oneOf:
            - $ref: "#/components/schemas/ProviderCredentialVersionID"
            - type: "null"
        version_status:
          type: string
          enum: [active, overlap, expired, revoked]
          description: An expired current version is unusable; rotate the active credential root before any admission or model call can use it.
        expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        overlap_expires_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        revoked_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
      description: Safe metadata only; secret material is never represented.
    ProviderCredentialList:
      type: object
      additionalProperties: false
      required: [items, has_more, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProviderCredential"
        has_more:
          type: boolean
        next_cursor:
          oneOf:
            - type: string
            - type: "null"
    InvocationInput:
      description: |
        A plain string is shorthand for one text block. Use the object form
        for ordered multi-block input; the launch contract supports text only.
      oneOf:
        - type: string
          minLength: 1
        - $ref: "#/components/schemas/InvocationInputBlocks"
    InvocationInputBlocks:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content:
          type: array
          minItems: 1
          maxItems: 64
          items:
            $ref: "#/components/schemas/TextInputBlock"
          description: Ordered caller-input blocks.
    TextInputBlock:
      type: object
      additionalProperties: false
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
          x-enum-varnames: [InputTypeText]
        text:
          type: string
          minLength: 1
    InlineExecutionSpec:
      type: object
      additionalProperties: false
      required: [model]
      properties:
        instructions:
          type: string
          minLength: 1
          description: Optional model instructions. Omission adds no hidden default.
        model:
          $ref: "#/components/schemas/ModelSelection"
        limits:
          $ref: "#/components/schemas/InvocationLimitRequest"
        output:
          $ref: "#/components/schemas/StructuredOutputSpec"
        tools:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/ToolSpec"
        mcp_servers:
          type: array
          maxItems: 8
          items:
            $ref: "#/components/schemas/MCPServerSpec"
      description: |
        Immutable launch snapshot. Unknown or deferred fields, including spec
        references, are rejected rather than ignored. Callback declarations
        require installation callback signing configuration. Remote MCP
        credential headers are encrypted outside this snapshot and never
        returned. A tools-bearing spec, including mcp_servers, requires at
        least two model iterations; omission resolves to three or the lower
        installation maximum.
    MCPServerSpec:
      type: object
      additionalProperties: false
      required: [name, url]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 24
          pattern: "^[A-Za-z0-9_-]+$"
          description: |
            Unique server name used as the projected tool-name prefix. Names
            beginning with nvoken in any letter case are reserved.
        url:
          type: string
          format: uri
          maxLength: 2048
          pattern: "^https://"
          description: Public HTTPS streamable-HTTP MCP endpoint without userinfo or a fragment.
        transport:
          type: string
          enum: [streamable_http]
          x-enum-varnames: [TransportStreamableHTTP]
        allowed_tools:
          type: array
          minItems: 1
          maxItems: 32
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 128
          description: Optional ordered allowlist. Every named tool must be discovered and projectable.
        headers:
          type: object
          maxProperties: 16
          additionalProperties:
            type: string
            minLength: 1
          writeOnly: true
          description: |
            Secret request headers, limited to 8 KiB encoded. Routing,
            framing, proxy, cookie, hop-by-hop, and MCP session headers are
            rejected. Headers are encrypted per Invocation and never returned.
        timeouts:
          $ref: "#/components/schemas/MCPTimeouts"
    MCPTimeouts:
      type: object
      additionalProperties: false
      properties:
        discovery_seconds:
          type: integer
          minimum: 1
          maximum: 30
          default: 10
        call_seconds:
          type: integer
          minimum: 1
          maximum: 120
          default: 30
    MCPListToolsRequest:
      type: object
      additionalProperties: false
      required: [server]
      properties:
        server:
          $ref: "#/components/schemas/MCPServerSpec"
    MCPToolAnnotations:
      type: object
      additionalProperties: false
      required: [read_only_hint, idempotent_hint, destructive_hint]
      properties:
        read_only_hint:
          type: [boolean, "null"]
        idempotent_hint:
          type: [boolean, "null"]
        destructive_hint:
          type: [boolean, "null"]
    MCPProjectedTool:
      type: object
      additionalProperties: false
      required: [server_name, projected_name, remote_name, description, input_schema, annotations]
      properties:
        server_name:
          type: string
        projected_name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9_-]+$"
        remote_name:
          type: string
        description:
          type: string
          maxLength: 4096
        input_schema:
          type: object
          additionalProperties: true
        annotations:
          $ref: "#/components/schemas/MCPToolAnnotations"
    MCPToolExclusion:
      type: object
      additionalProperties: false
      required: [server_name, remote_name, reason]
      properties:
        server_name:
          type: string
        remote_name:
          type: string
        reason:
          type: string
          enum: [not_allowlisted, invalid_name, name_collision, invalid_schema, schema_too_large, schema_too_deep]
    MCPListToolsResponse:
      type: object
      additionalProperties: false
      required: [tools, exclusions]
      properties:
        tools:
          type: array
          maxItems: 64
          items:
            $ref: "#/components/schemas/MCPProjectedTool"
        exclusions:
          type: array
          items:
            $ref: "#/components/schemas/MCPToolExclusion"
    ToolSpec:
      oneOf:
        - $ref: "#/components/schemas/HostToolSpec"
        - $ref: "#/components/schemas/CallbackToolSpec"
    HostToolSpec:
      type: object
      additionalProperties: false
      required: [name, description, mode, input_schema]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9_-]+$"
          description: Unique within the spec; the `nvoken_` prefix is reserved.
        description:
          type: string
          minLength: 1
          maxLength: 4096
        mode:
          type: string
          enum: [host]
          x-enum-varnames: [ModeHost]
        input_schema:
          type: object
          additionalProperties: true
          description: |
            Object-root JSON Schema using the same bounded, self-contained
            subset as structured output. Compact canonical JSON is limited to
            32 KiB.
    CallbackToolSpec:
      type: object
      additionalProperties: false
      required: [name, description, mode, input_schema, callback]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9_-]+$"
          description: Unique within the spec; the `nvoken_` prefix is reserved.
        description:
          type: string
          minLength: 1
          maxLength: 4096
        mode:
          type: string
          enum: [callback]
          x-enum-varnames: [ModeCallback]
        input_schema:
          type: object
          additionalProperties: true
          description: |
            Object-root JSON Schema using the same bounded, self-contained
            subset as structured output. Compact canonical JSON is limited to
            32 KiB.
        callback:
          $ref: "#/components/schemas/CallbackTarget"
    CallbackTarget:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          pattern: "^https://"
          description: |
            Public HTTPS endpoint. Userinfo and fragments are rejected. Every
            dial revalidates resolved addresses and refuses redirects.
    StructuredOutputSpec:
      type: object
      additionalProperties: false
      required: [schema]
      properties:
        schema:
          type: object
          additionalProperties: true
          description: |
            Self-contained JSON Schema for an object result. Compact canonical
            JSON is limited to 32 KiB and 16 schema positions. Supported
            keywords are type, title, description, properties, required,
            additionalProperties, items, enum, pattern, minLength, maxLength,
            minItems, maxItems, minimum, and maximum. Every schema position has
            one string type; pattern values are limited to 1,024 UTF-8 bytes;
            references and other keywords are rejected.
      description: |
        Optional per-Invocation structured-output contract. nvoken exposes a
        reserved durable submit tool and publishes only a server-validated
        terminal object. This does not enable host-defined tools.
    InvocationLimitRequest:
      type: object
      additionalProperties: false
      properties:
        total_timeout_seconds:
          type: integer
          minimum: 1
        active_timeout_seconds:
          type: integer
          minimum: 1
        waiting_timeout_seconds:
          type: integer
          minimum: 1
        max_output_tokens:
          type: integer
          minimum: 1
        max_estimated_cost_usd:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.000001
          description: |
            nvoken's standard list-price guardrail, not preauthorization or a billing
            ledger. Requires known USD pricing for the selected model and
            otherwise fails closed with `budget_exceeded` and
            `details.kind = estimated_cost_unavailable`. When pricing absence
            is knowable before execution, nvoken rejects before a provider call.
        max_iterations:
          type: integer
          minimum: 1
      description: |
        Optional requested limits. Total time bounds the entire turn, active
        time bounds model and tool execution, and waiting time bounds the
        cumulative time parked for host or callback tool results. Installation
        defaults supply all three time limits and the iteration limit.
        Output-token and estimated-cost limits are unlimited when omitted.
        Installation maxima may be lower than the schema's numeric range.
    ModelSelection:
      type: object
      additionalProperties: false
      required: [provider, id]
      properties:
        provider:
          $ref: "#/components/schemas/ModelProvider"
        id:
          type: string
          minLength: 1
          maxLength: 255
    InvocationStatus:
      type: string
      enum: [queued, running, waiting, completed, failed, cancelled]
      description: |
        `completed`, `failed`, and `cancelled` are terminal and immutable.
        Deadline or budget exhaustion settles as `failed`. `waiting` means the
        Invocation has durable pending host ToolCalls and owns no execution
        lease. Final result acceptance moves it back to `queued`. Checkpoint
        recovery may also move `running` back to `queued`; lifecycle revision
        orders every transition.
    InvocationAcknowledgement:
      type: object
      additionalProperties: false
      required: [agent_id, session_id, invocation_id, status, deduplicated, deadline_at]
      properties:
        agent_id:
          $ref: "#/components/schemas/AgentID"
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        status:
          $ref: "#/components/schemas/InvocationStatus"
        deduplicated:
          type: boolean
        deadline_at:
          type: string
          format: date-time
    Invocation:
      type: object
      additionalProperties: false
      required: [id, agent_id, session_id, status, error, usage, provenance, structured_output, structured_output_provenance, limits, active_execution_ms, deadline_at, created_at, updated_at, ended_at]
      properties:
        id:
          $ref: "#/components/schemas/InvocationID"
        agent_id:
          $ref: "#/components/schemas/AgentID"
        session_id:
          $ref: "#/components/schemas/SessionID"
        status:
          $ref: "#/components/schemas/InvocationStatus"
        error:
          oneOf:
            - $ref: "#/components/schemas/InvocationFailure"
            - type: "null"
        usage:
          oneOf:
            - $ref: "#/components/schemas/ModelUsage"
            - type: "null"
          description: One normalized terminal aggregate, not a billing ledger.
        provenance:
          oneOf:
            - $ref: "#/components/schemas/ModelProvenance"
            - type: "null"
        structured_output:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
          description: |
            Server-validated terminal object for a schema-bearing Invocation.
            Null until successful terminal settlement and always null when no
            output contract was admitted.
        structured_output_provenance:
          oneOf:
            - $ref: "#/components/schemas/StructuredOutputProvenance"
            - type: "null"
        limits:
          $ref: "#/components/schemas/InvocationLimits"
        active_execution_ms:
          type: integer
          minimum: 0
        deadline_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ended_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        pending_tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/PendingHostToolCall"
          description: Present for a waiting Invocation with unresolved host calls.
    InvocationList:
      type: object
      additionalProperties: false
      required: [items, has_more, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Invocation"
        has_more:
          type: boolean
        next_cursor:
          oneOf:
            - type: string
            - type: "null"
    InvocationResult:
      type: object
      additionalProperties: false
      required: [invocation, messages, output_text]
      properties:
        invocation:
          $ref: "#/components/schemas/Invocation"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SessionMessage"
          description: |
            Every canonical SessionMessage owned by this Invocation, all
            roles, ascending sequence, composed at read time from the
            canonical transcript. Nothing is stored twice.
        output_text:
          oneOf:
            - type: string
            - type: "null"
          description: |
            The text content blocks of this Invocation's assistant-role
            messages concatenated in transcript order without separators.
            Non-null only when the Invocation is completed and at least one
            assistant text block exists. Failed and cancelled Invocations
            keep their messages readable as evidence while output_text stays
            null.
    ModelUsage:
      type: object
      additionalProperties: false
      required: [input_tokens, output_tokens]
      properties:
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        cache_creation_input_tokens:
          type: integer
          minimum: 0
        cache_read_input_tokens:
          type: integer
          minimum: 0
        reasoning_tokens:
          type: integer
          minimum: 0
        iterations:
          type: integer
          minimum: 0
          description: Model requests represented by this aggregate. Older retained evidence may omit it.
        estimated_cost:
          $ref: "#/components/schemas/ModelCost"
    ModelCost:
      type: object
      additionalProperties: false
      required: [input, output, cache_read, cache_write, total]
      properties:
        input:
          type: number
          minimum: 0
        output:
          type: number
          minimum: 0
        cache_read:
          type: number
          minimum: 0
        cache_write:
          type: number
          minimum: 0
        total:
          type: number
          minimum: 0
        currency:
          type: string
        model:
          type: string
    ModelProvenance:
      type: object
      additionalProperties: false
      required: [provider, requested_model, served_model, credential_source]
      properties:
        provider:
          type: string
        requested_model:
          type: string
        served_model:
          type: string
        credential_source:
          type: string
          enum: [caller_ephemeral, account_byok, tenant_byok, platform, installation_byok]
        provider_credential_id:
          $ref: "#/components/schemas/ProviderCredentialID"
        credential_version_id:
          $ref: "#/components/schemas/ProviderCredentialVersionID"
      description: |
        Reusable BYOK sources include safe credential and version IDs. Caller,
        platform, and installation sources omit them. No secret material is
        included.
    StructuredOutputProvenance:
      type: object
      additionalProperties: false
      required: [source, tool_call_id, schema_sha256]
      properties:
        source:
          type: string
          enum: [tool_call]
          x-enum-varnames: [SourceToolCall]
        tool_call_id:
          type: string
          pattern: "^tcal_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
        schema_sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
      description: |
        Immutable proof that output equals the request of the accepted
        reserved durable ToolCall under the admitted schema digest.
    ToolCallID:
      type: string
      pattern: "^tcal_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    PendingHostToolCall:
      type: object
      additionalProperties: false
      required: [id, name, input, deadline_at]
      properties:
        id:
          $ref: "#/components/schemas/ToolCallID"
        name:
          type: string
        input: {}
        deadline_at:
          type: string
          format: date-time
    SubmitHostToolResultsRequest:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results:
          type: array
          minItems: 1
          maxItems: 32
          items:
            type: object
            additionalProperties: false
            required: [tool_call_id, content]
            properties:
              tool_call_id:
                $ref: "#/components/schemas/ToolCallID"
              content: {}
              is_error:
                type: boolean
    HostToolResultAcceptance:
      type: object
      additionalProperties: false
      required: [tool_call_id, status, deduplicated]
      properties:
        tool_call_id:
          $ref: "#/components/schemas/ToolCallID"
        status:
          type: string
          enum: [completed, failed]
        deduplicated:
          type: boolean
    SubmitHostToolResultsResponse:
      type: object
      additionalProperties: false
      required: [invocation_id, session_id, status, results, pending_tool_calls]
      properties:
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        session_id:
          $ref: "#/components/schemas/SessionID"
        status:
          $ref: "#/components/schemas/InvocationStatus"
        results:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: "#/components/schemas/HostToolResultAcceptance"
        pending_tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/PendingHostToolCall"
    InvocationFailure:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - deadline_exceeded
            - budget_exceeded
            - credential_unavailable
            - provider_error
            - mcp_discovery_failed
            - structured_output_unsatisfied
            - internal
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      description: |
        Failed Invocations may carry paired usage and provenance when a model
        response produced safe normalized evidence before deadline or limit
        settlement. Cancellation and pre-response failures carry neither.
    InvocationLimits:
      type: object
      additionalProperties: false
      required: [total_timeout_seconds, active_timeout_seconds, waiting_timeout_seconds, max_iterations]
      properties:
        total_timeout_seconds:
          type: integer
          minimum: 1
        active_timeout_seconds:
          type: integer
          minimum: 1
        waiting_timeout_seconds:
          type: integer
          minimum: 1
        max_output_tokens:
          type: integer
          minimum: 1
        max_estimated_cost_usd:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.000001
          description: |
            Resolved USD list-price guardrail. It is present only when the host
            requested a cost limit; unknown price metadata fails closed.
        max_iterations:
          type: integer
          minimum: 1
    Session:
      type: object
      additionalProperties: false
      required: [id, agent_id, tenant_key, session_key, active_invocation_id, active_invocation_status, created_at, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/SessionID"
        agent_id:
          $ref: "#/components/schemas/AgentID"
        tenant_key:
          oneOf:
            - type: string
            - type: "null"
          description: Immutable effective tenant partition reference.
        session_key:
          oneOf:
            - type: string
            - type: "null"
        active_invocation_id:
          oneOf:
            - $ref: "#/components/schemas/InvocationID"
            - type: "null"
          description: The queued, running, or waiting Invocation, if one exists.
        active_invocation_status:
          oneOf:
            - type: string
              enum: [queued, running, waiting]
            - type: "null"
          description: Status of active_invocation_id; null exactly when that ID is null.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        pending_tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/PendingHostToolCall"
          description: Pending host calls for the active waiting Invocation.
    SessionList:
      type: object
      additionalProperties: false
      required: [items, has_more, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        has_more:
          type: boolean
        next_cursor:
          oneOf:
            - type: string
            - type: "null"
    SessionMessageRole:
      type: string
      enum: [user, assistant, tool]
    SessionContentBlock:
      type: object
      additionalProperties: true
      required: [type]
      properties:
        type:
          type: string
      description: A canonical provider-neutral content block preserved losslessly.
    SessionMessage:
      type: object
      additionalProperties: false
      required: [id, session_id, agent_id, invocation_id, sequence, role, content, created_at]
      properties:
        id:
          type: string
          pattern: "^smsg_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
        session_id:
          $ref: "#/components/schemas/SessionID"
        agent_id:
          $ref: "#/components/schemas/AgentID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        sequence:
          type: integer
          format: int64
          minimum: 1
        role:
          $ref: "#/components/schemas/SessionMessageRole"
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SessionContentBlock"
        created_at:
          type: string
          format: date-time
    SessionMessageList:
      type: object
      additionalProperties: false
      required: [items, has_more, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionMessage"
        has_more:
          type: boolean
        next_cursor:
          oneOf:
            - type: string
            - type: "null"
    InvocationChange:
      type: object
      additionalProperties: false
      required: [invocation_id, revision, status, through_message_sequence, error, usage, provenance, structured_output, structured_output_provenance, occurred_at]
      properties:
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        revision:
          type: integer
          format: int64
          minimum: 1
        status:
          $ref: "#/components/schemas/InvocationStatus"
        through_message_sequence:
          oneOf:
            - type: integer
              format: int64
              minimum: 1
            - type: "null"
        error:
          oneOf:
            - $ref: "#/components/schemas/InvocationFailure"
            - type: "null"
        usage:
          oneOf:
            - $ref: "#/components/schemas/ModelUsage"
            - type: "null"
        provenance:
          oneOf:
            - $ref: "#/components/schemas/ModelProvenance"
            - type: "null"
        structured_output:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
        structured_output_provenance:
          oneOf:
            - $ref: "#/components/schemas/StructuredOutputProvenance"
            - type: "null"
        occurred_at:
          type: string
          format: date-time
    TranscriptSnapshot:
      type: object
      additionalProperties: false
      required: [messages, invocation_changes, has_more, resume_cursor, next_page_token]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SessionMessage"
        invocation_changes:
          type: array
          items:
            $ref: "#/components/schemas/InvocationChange"
        has_more:
          type: boolean
        resume_cursor:
          type: string
          minLength: 1
          description: Delivered composite message-sequence and lifecycle-revision watermark.
        next_page_token:
          oneOf:
            - type: string
            - type: "null"
    TranscriptUpdate:
      type: object
      additionalProperties: false
      required: [type, session_id, messages, invocation_changes, resume_cursor]
      properties:
        type:
          type: string
          enum: [transcript.update]
          x-enum-varnames: [EventTranscriptUpdate]
        session_id:
          $ref: "#/components/schemas/SessionID"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SessionMessage"
        invocation_changes:
          type: array
          items:
            $ref: "#/components/schemas/InvocationChange"
        resume_cursor:
          type: string
          minLength: 1
          description: Delivered composite message-sequence and lifecycle-revision watermark.
    OutputTextDeltaEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, attempt, iteration, content_index, text, emitted_at]
      properties:
        type:
          type: string
          enum: [output_text.delta]
          x-enum-varnames: [EventOutputTextDelta]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        attempt:
          type: integer
          format: int64
          minimum: 1
          description: |
            Execution attempt that emitted this preview. Discard provisional
            output from earlier attempts when this value increases.
        iteration:
          type: integer
          minimum: 1
          description: Model iteration that owns the assistant message.
        content_index:
          type: integer
          minimum: 0
        text:
          type: string
          minLength: 1
        emitted_at:
          type: string
          format: date-time
    ThinkingDeltaEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, attempt, iteration, content_index, thinking, emitted_at]
      properties:
        type:
          type: string
          enum: [thinking.delta]
          x-enum-varnames: [EventThinkingDelta]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        attempt:
          type: integer
          format: int64
          minimum: 1
          description: |
            Execution attempt that emitted this preview. Discard provisional
            output from earlier attempts when this value increases.
        iteration:
          type: integer
          minimum: 1
          description: Model iteration that owns the assistant message.
        content_index:
          type: integer
          minimum: 0
        thinking:
          type: string
          minLength: 1
        emitted_at:
          type: string
          format: date-time
    StreamResyncEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, reason]
      properties:
        type:
          type: string
          enum: [stream.resync]
          x-enum-varnames: [EventStreamResync]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          oneOf:
            - $ref: "#/components/schemas/InvocationID"
            - type: "null"
        reason:
          type: string
          enum: [live_delivery_gap]
          x-enum-varnames: [ReasonLiveDeliveryGap]
    StreamEndEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, reason, resume_cursor]
      properties:
        type:
          type: string
          enum: [stream.end]
          x-enum-varnames: [EventStreamEnd]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          oneOf:
            - $ref: "#/components/schemas/InvocationID"
            - type: "null"
        reason:
          type: string
          enum: [terminal, rotate]
          description: |
            `rotate` means reconnect with `resume_cursor`. `terminal` means
            the scoped Invocation settled, or the Session became idle for a
            Session-scoped stream.
        resume_cursor:
          type: string
          minLength: 1
    TranscriptStreamEvent:
      description: |
        The JSON value carried by one Session-stream SSE `data:` field.
        Durable `transcript.update` frames carry the resume cursor as both
        payload data and SSE `id`; preview and control frames never carry IDs.
      oneOf:
        - $ref: "#/components/schemas/TranscriptUpdate"
        - $ref: "#/components/schemas/OutputTextDeltaEvent"
        - $ref: "#/components/schemas/ThinkingDeltaEvent"
        - $ref: "#/components/schemas/StreamResyncEvent"
        - $ref: "#/components/schemas/StreamEndEvent"
    InvocationAcceptedEvent:
      type: object
      additionalProperties: false
      required: [type, agent_id, session_id, invocation_id, status, deduplicated, deadline_at]
      properties:
        type:
          type: string
          enum: [invocation.accepted]
          x-enum-varnames: [EventInvocationAccepted]
        agent_id:
          $ref: "#/components/schemas/AgentID"
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        status:
          $ref: "#/components/schemas/InvocationStatus"
        deduplicated:
          type: boolean
        deadline_at:
          type: string
          format: date-time
    InvocationUpdateEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, invocation, new_messages]
      properties:
        type:
          type: string
          enum: [invocation.update]
          x-enum-varnames: [EventInvocationUpdate]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        invocation:
          $ref: "#/components/schemas/Invocation"
        new_messages:
          type: array
          items:
            $ref: "#/components/schemas/SessionMessage"
    InvocationResultEvent:
      type: object
      additionalProperties: false
      required: [type, session_id, invocation_id, result]
      properties:
        type:
          type: string
          enum: [invocation.result]
          x-enum-varnames: [EventInvocationResult]
        session_id:
          $ref: "#/components/schemas/SessionID"
        invocation_id:
          $ref: "#/components/schemas/InvocationID"
        result:
          $ref: "#/components/schemas/InvocationResult"
    InvocationStreamEvent:
      description: |
        Typed event from one Invocation stream. A minimal consumer prints
        `output_text.delta` and finishes on `invocation.result`.
      oneOf:
        - $ref: "#/components/schemas/InvocationAcceptedEvent"
        - $ref: "#/components/schemas/OutputTextDeltaEvent"
        - $ref: "#/components/schemas/ThinkingDeltaEvent"
        - $ref: "#/components/schemas/InvocationUpdateEvent"
        - $ref: "#/components/schemas/InvocationResultEvent"
        - $ref: "#/components/schemas/StreamResyncEvent"
        - $ref: "#/components/schemas/StreamEndEvent"
    ErrorCode:
      type: string
      enum:
        - invalid_request
        - unauthenticated
        - forbidden
        - not_found
        - idempotency_conflict
        - provider_credential_conflict
        - session_invocation_active
        - invocation_not_waiting
        - tool_result_conflict
        - tool_result_expired
        - mcp_discovery_failed
        - rate_limited
        - internal
        - unavailable
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
  responses:
    InvalidRequest:
      description: The request is invalid or contains a deferred field.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: invalid_request
            message: spec.tools[0].mode must be host.
            request_id: req_01K0NV9K7Z9WR3Y3Q3RMV2G7H0
            details:
              field: spec.tools[0].mode
    Unauthenticated:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: unauthenticated
            message: A valid API credential is required.
            request_id: req_01K0NVA1K5T8Y1MBVX7TZBM21H
    Forbidden:
      description: The authenticated credential is not permitted to make this request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: forbidden
            message: The requested tenant_key conflicts with the credential constraint.
            request_id: req_01K0NVAE24H917QNE9P1QMX95Y
    NotFound:
      description: The resource is missing or cannot be disclosed in this scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: not_found
            message: The requested resource was not found.
            request_id: req_01K0NVASB4CF29K41VZA271H23
    RateLimited:
      description: The request is rate limited.
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 0
          description: Seconds before the caller should retry.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: rate_limited
            message: Too many requests.
            request_id: req_01K0NVB0QFQP0YNSVD3CB7E97S
    Internal:
      description: An unexpected server error occurred before acknowledgement.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: internal
            message: The request could not be completed.
            request_id: req_01K0NVB8MJPBPQY0WXFJGCXEH3
    Unavailable:
      description: The service cannot currently complete admission or the read.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: unavailable
            message: The service is temporarily unavailable.
            request_id: req_01K0NVBGWQ1V6JJBVH0Q4WZRS1
    MCPDiscoveryFailed:
      description: The remote MCP server could not be safely discovered or projected.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: mcp_discovery_failed
            message: The remote MCP server could not be discovered.
            request_id: req_01K0NVCPKYGE1D64K9DXMZ7J64
