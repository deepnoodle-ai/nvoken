name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nvoken_test
          POSTGRES_PASSWORD: nvoken-test
          POSTGRES_USER: nvoken
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready --username=nvoken --dbname=nvoken_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
          cache-dependency-path: |
            go.sum
            sdk/go/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: make check
      - name: Check single-daemon diagnostic against PostgreSQL 17
        env:
          NVOKEN_TEST_DATABASE_URL: postgres://nvoken:nvoken-test@127.0.0.1:5432/nvoken_test?sslmode=disable
        run: go test ./cmd/nvokend -run '^TestSingleDaemonProfileExamplePassesDiagnostic$' -count=1
      - run: make sdk-check
