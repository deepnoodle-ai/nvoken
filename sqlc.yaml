version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/adapters/postgres/migrations"
    queries: "internal/adapters/postgres/queries"
    gen:
      go:
        package: "postgresdb"
        out: "internal/adapters/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_sql_as_comment: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
