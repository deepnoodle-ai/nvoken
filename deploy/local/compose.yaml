name: nvoken-local

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nvoken
      POSTGRES_PASSWORD: nvoken-local
      POSTGRES_USER: nvoken
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=nvoken --dbname=nvoken"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

